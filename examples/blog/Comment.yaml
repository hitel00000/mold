resource:
  name: Comment
  timestamps: true
  soft_delete: true

fields:
  - name: body
    type: text
    nullable: false
  - name: post_id
    type: int
    nullable: false
  - name: author_id
    type: int
    nullable: false

relations:
  - name: post
    kind: belongs_to
    target: Post
    foreign_key: post_id
    on_delete: restrict
  - name: author
    kind: belongs_to
    target: User
    foreign_key: author_id

auth:
  ownership_field: author_id
  permissions:
    create: authenticated
    read: public
    update: owner
    delete: owner
