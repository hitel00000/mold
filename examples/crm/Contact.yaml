resource:
  name: Contact
  timestamps: true
  soft_delete: true

fields:
  - name: name
    type: string
    nullable: false
  - name: email
    type: email
    nullable: false
  - name: phone
    type: string
    nullable: true
  - name: company_id
    type: int
    nullable: false

relations:
  - name: company
    kind: belongs_to
    target: Company
    foreign_key: company_id
    on_delete: restrict

auth:
  permissions:
    create: authenticated
    read: authenticated
    update: authenticated
    delete: role:admin
